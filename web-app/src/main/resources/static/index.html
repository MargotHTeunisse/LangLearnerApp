<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LangLearner</title>
    <link rel="shortcut icon" href="#">
    <link rel="stylesheet" href="css/stylesheet.css">
    <script src="js/js-functions.js" async></script>
</head>
<body>
<div>
<div id="word" class="card">#####</div>
<form id="translation" autocomplete="off">
</form>
<div id="feedback"><br></div>
    <div style="position:relative;text-align:right">
        <input id = "button" type = "button" onclick=showAnswer() value = "Show answer">
    </div>
</div>

<script>
    onload = () => {load();}

    let form = document.getElementById("translation");

    form.addEventListener('submit', (e) => {
        e.preventDefault();
        e.stopPropagation();
        submitAnswer();
    });
</script>
</body>
</html>
