<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LangLearner</title>
    <link rel="shortcut icon" href="#">
    <link rel="stylesheet" href="css/stylesheet.css">
</head>
<body>
<div>You have translated all words! </div>
<button id="replayButton" onclick="location.href='index.html'">Play Again</button>
<script>
    var replayButton = document.getElementById("replayButton");

    document.addEventListener('keypress', (e) => {
        if (e.key === "Enter") {
            replayButton.click();
        }
    });
</script>
</body>
</html>
